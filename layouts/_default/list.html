{{ define "main" }}
<div class="list-page">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    <ul class="post-list">
        {{ range .Pages }}
        <li class="post-item">
            <h2 class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
            <div class="post-date">{{ .Date.Format "January 2, 2006" }}</div>
            {{ if .Summary }}
            <div class="post-summary">{{ .Summary }}</div>
            {{ end }}
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
